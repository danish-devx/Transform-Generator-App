<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">

        <h1 class="text-center mb-5 fw-bold">Transform Generator</h1>

        <div class="row g-4 align-items-start">


            <div class="col-lg-5 text-center">
                <div class="preview-wrapper">
                    <div class="preview-box" id="box">
                        Transform
                    </div>
                </div>
            </div>


            <div class="col-lg-7">
                <div class="card shadow-sm p-4 border-0 rounded-4">

                    <div class="mb-3">
                        <label class="form-label">Rotate (deg)</label>
                        <input type="range" class="form-range" id="rotate" min="0" max="360" value="0">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Scale</label>
                        <input type="range" class="form-range" id="scale" min="0.5" max="2" step="0.1" value="1">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Translate X (px)</label>
                        <input type="range" class="form-range" id="translateX" min="-200" max="200" value="0">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Translate Y (px)</label>
                        <input type="range" class="form-range" id="translateY" min="-200" max="200" value="0">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Skew X (deg)</label>
                        <input type="range" class="form-range" id="skewX" min="-90" max="90" value="0">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Skew Y (deg)</label>
                        <input type="range" class="form-range" id="skewY" min="-90" max="90" value="0">
                    </div>

                    <h6 class="fw-bold">CSS Code</h6>

                    <div class="code-box mb-3" id="cssCode">
                        transform: rotate(0deg) scale(1) translate(0px, 0px) skew(0deg, 0deg);
                    </div>

                    <button class="btn-gradient w-100" id="copyBtn">
                        Copy CSS
                    </button>

                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
